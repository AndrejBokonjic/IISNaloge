name: Fetch data on schedule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  fetch_air:
    name: Fetch and pre-process air data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          pip install uv

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          uv sync --python $(which python)

      - name: Install dependencies
        run: |
          pip install requests pandas numpy lxml pathlib datetime

      - name: Run fetch script
        run: |
          python src/data/fetch_air_data.py

      - name: Run pre-process script
        run: |
          python src/data/preprocess_air_data.py

      - name: Commit data changes
        run: |
          git add data
          git config --local user.email "andrej.bokonjic@student.um.si"
          git config --local user.name "AndrejBokonjic"
          git commit -m "Updated raw air data on `date` with GitHub Actions"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.PAT_TOKEN }}