stages:
  fetch:
    cmd: |
      uv run python src/data/fetch_air_data.py
      git commit -am "Updated raw air data on `date` with DVC pipeline and GitHub workflows" || true
      git push || true
      dvc push || true
    deps:
      - src/data/fetch_air_data.py
    params:
      - fetch.url
    outs:
      - data/raw/air/air_data.xml
    always_changed: true

  preprocess:
    cmd: |
      uv run python src/data/preprocess_air_data.py
      git commit -am "Updated preprocessed air data on `date` with DVC pipeline and GitHub workflows" || true
      git push || true
      dvc push || true
    deps:
      - src/data/preprocess_air_data.py
      - data/raw/air/air_data.xml
    params:
      - preprocess.station
    outs:
      - data/preprocessed/air:
          persist: true

  validate:
    cmd: |
      uv run python src/data/setup_ge.py
      uv run python src/data/run_checkpoint.py
    deps:
      - src/data/run_checkpoint.py
      - src/data/setup_ge.py
      - data/preprocessed/air/
    outs:
      - gx/uncommitted:
          persist: true
      - gx/checkpoints:
          persist: true
      - gx/expectations:
          persist: true

  test_data:
    cmd: |
      uv run python src/data/test_data.py
    deps:
      - src/data/test_data.py
      - data/preprocessed/air/
    outs:
      - data/reference/air:
          persist: true

  train:
    cmd: |
      uv run python src/model/train.py
      git commit -am "Updated model on `date` with DVC pipeline and GitHub workflows" || true
      git push || true
      dvc push || true
    deps:
      - src/model/preprocess.py
      - src/model/train.py
      - data/preprocessed/air/
      - gx/uncommitted
      - data/reference/air
    params:
      - train.station
      - train.test_size
      - train.random_state
      - train.window_size
      - train.target_col
    outs:
      - models/:
          persist: true