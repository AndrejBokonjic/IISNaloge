stages:
  fetch:
    cmd: python src/data/fetch_air_data.py
    deps:
    - src/data/fetch_air_data.py
    params:
    - fetch.url
    outs:
    - data/raw/air/air_data.xml
  preprocess:
    cmd: python src/data/preprocess_air_data.py
    deps:
    - data/raw/air/air_data.xml
    - src/data/preprocess_air_data.py
    params:
    - preprocess.station
    outs:
    - data/preprocessed/air
