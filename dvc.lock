      true\ngit push || true\npython3 -m dvc push || true\n"
    deps:
    - path: data/raw/air/air_data.xml
      hash: md5
      md5: 21db5d7010242a112f8acd134958a11e
      size: 1170387
    - path: src/data/preprocess_air_data.py
      hash: md5
      md5: fdc54d03a62ec35f826fc4f19a376d77
      size: 1917
    params:
      params.yaml:
        preprocess.station: E410
    outs:
    - path: data/preprocessed/air
      hash: md5
      md5: 870d5782fd0964b6433e7ce65d054e51.dir
      size: 81997
      nfiles: 23
  validate:
    cmd: uv run python src/data/validate_air_data.py
    deps:
    - path: data/preprocessed/air
      hash: md5
      md5: 870d5782fd0964b6433e7ce65d054e51.dir
      size: 81997
      nfiles: 23
    - path: src/data/validate_air_data.py
      hash: md5
      md5: ccb1c0706da6ef259a74279c663e50b8
