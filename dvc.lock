schema: '2.0'
stages:
  fetch:
    cmd: "uv run python src/data/fetch_air_data.py\ngit commit -am \"Updated raw air
      data on `date` with DVC pipeline and GitHub workflows\" || true\ngit push ||
      true\npython3 -m dvc push || true\n"
    deps:
    - path: src/data/fetch_air_data.py
      hash: md5
      md5: 7252eae429336b48c890de35c85a8c88
      size: 985
    params:
      params.yaml:
        fetch.url: 
          https://www.arso.gov.si/xml/zrak/ones_zrak_urni_podatki_7dni.xml
    outs:
    - path: data/raw/air/air_data.xml
      hash: md5
      md5: 05345858d832951eba5625d04d5e16dc
      size: 1171781
  preprocess:
    cmd: "uv run python src/data/preprocess_air_data.py\ngit commit -am \"Updated
      preprocessed air data on `date` with DVC pipeline and GitHub workflows\" ||
      true\ngit push || true\npython3 -m dvc push || true\n"
    deps:
    - path: data/raw/air/air_data.xml
      hash: md5
      md5: 6306d222f7a0765190fa257fffb08710
      size: 1172106
    - path: src/data/preprocess_air_data.py
      hash: md5
      md5: fdc54d03a62ec35f826fc4f19a376d77
      size: 1917
    params:
      params.yaml:
        preprocess.station: E410
    outs:
    - path: data/preprocessed/air
      hash: md5
      md5: f96a4a4a31df31aaf6c631d36433d46a.dir
      size: 81258
      nfiles: 23
  validate:
    cmd: uv run python src/data/validate_air_data.py
    deps:
    - path: data/preprocessed/air
      hash: md5
      md5: f96a4a4a31df31aaf6c631d36433d46a.dir
      size: 81258
      nfiles: 23
    - path: src/data/validate_air_data.py
      hash: md5
      md5: ccb1c0706da6ef259a74279c663e50b8
      size: 1427
    params:
      params.yaml:
        preprocess.station: E410
